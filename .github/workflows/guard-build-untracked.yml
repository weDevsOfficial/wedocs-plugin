name: Guard — built assets must stay untracked
on:
  pull_request:
  push:
    branches: [ develop, master ]
jobs:
  no-tracked-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if assets/build is tracked
        run: |
          if git ls-files assets/build | grep -q .; then
            echo "::error::assets/build is tracked — it must be gitignored and built in CI."
            echo "Fix on your branch:  git rm -r --cached assets/build && git commit -m \"chore: stop tracking built assets\""
            git ls-files assets/build | head
            exit 1
          fi
          echo "OK: assets/build is not tracked"

name: Deploy to WordPress.org
on:
  push:
    tags:
      - "*"
permissions:
  contents: write
jobs:
  tag:
    name: Deploy plugin for new Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Use desired version of PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install WP-CLI
        run: |
          curl -sSL -o wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Generate POT
        run: npm run make-pot:local

      - name: Composer install (no dev)
        run: composer install --no-dev --optimize-autoloader

      # assets/build is NOT tracked in git — it is built here and shipped via
      # BUILD_DIR below. Stage a clean copy of exactly what wp.org should get.
      - name: Stage plugin (build dir)
        run: |
          mkdir -p dist
          rsync -rc ./ dist/ \
            --exclude-from=.distignore \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            --exclude='wp-cli.phar' \
            --exclude='RELEASE_NOTES.md' \
            --exclude='wedocs.v*.zip'
          echo "---- staged tree (top) ----"; ls dist
          # Hard gate: the built blocks MUST be in the package or activation fatals.
          test -f dist/assets/build/index.js \
            || { echo "::error::dist/assets/build/index.js missing — build/stage failed"; exit 1; }
          test -f dist/assets/build/blocks/DocsGrid/render.php \
            || { echo "::error::dist/assets/build/blocks/DocsGrid/render.php missing"; exit 1; }
          echo "OK: built assets present in BUILD_DIR ($(find dist/assets/build -type f | wc -l) files)"

      # Distributable zip via weDocs' own flow (bin/zip.js -> wedocs.vX.Y.Z.zip)
      - name: Generate weDocs zip
        run: npm run zip:create

      - name: Extract changelog
        run: |
          { echo "## Changelog"; echo ""; \
            awk '/^\*\*v[0-9]/{n++; if(n>1) exit} n>=1{print}' readme.txt; } > RELEASE_NOTES.md
          echo "---- release notes ----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: wedocs.v*.zip
          body_path: RELEASE_NOTES.md

      # Deploy the staged BUILD_DIR (includes the freshly built assets/build).
      # BUILD_DIR deploys its contents verbatim — .distignore was already applied
      # during staging above.
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          dry-run: false
        env:
          BUILD_DIR: ./dist
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: wedocs

name: Deploy to WordPress.org
on:
  push:
    tags:
      - "*"
permissions:
  contents: write
jobs:
  tag:
    name: Deploy plugin for new Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Use desired version of PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # setup-php's `tools: wp-cli` is flaky (wp: not found -> POT step 127); install the phar.
      - name: Install WP-CLI
        run: |
          curl -sSL -o wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Generate POT
        run: npm run make-pot:local

      - name: Composer install (no dev)
        run: composer install --no-dev --optimize-autoloader

      # assets/build is gitignored (NOT committed) — built in CI above. Appsero's
      # automatic wp.org release is OFF, so this 10up deploy is the sole publisher.
      # The default 10up flow rsyncs the working tree (with the freshly built
      # assets/build) to SVN, applying .distignore — exactly like
      # wedevs-project-manager ships its gitignored /views/assets/dist. Hard gate:
      # if the build didn't land on disk the package would ship with no blocks.
      - name: Verify built assets exist on disk
        run: |
          test -f assets/build/index.js \
            || { echo "::error::assets/build/index.js missing — build failed"; exit 1; }
          test -f assets/build/blocks/DocsGrid/render.php \
            || { echo "::error::assets/build/blocks/DocsGrid/render.php missing"; exit 1; }
          echo "OK: built assets present on disk ($(find assets/build -type f | wc -l) files)"

      # Distributable zip via weDocs' own flow (bin/zip.js -> wedocs.vX.Y.Z.zip)
      - name: Generate weDocs zip
        run: npm run zip:create

      # Pull this version's changelog block out of readme.txt for the release notes.
      - name: Extract changelog
        run: |
          { echo "## Changelog"; echo ""; \
            awk '/^\*\*v[0-9]/{n++; if(n>1) exit} n>=1{print}' readme.txt; } > RELEASE_NOTES.md
          echo "---- release notes ----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: wedocs.v*.zip
          body_path: RELEASE_NOTES.md

      # wp.org SVN deploy last — the zip/Release above survive a deploy retry.
      # NO BUILD_DIR: it makes 10up sync the git-tracked set instead of the working
      # tree, which strips the gitignored assets/build. Do not reintroduce it.
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          dry-run: false
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: wedocs
